<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Exam Typing Test — GOTypingTest.com</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
<link rel="stylesheet" href="css/style.css">
<style>
body { background: #06080f; }
.exam-header {
  background: #1a237e;
  padding: 10px 20px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: 10px;
  border-bottom: 2px solid #3949ab;
}
.exam-header-title { font-weight: 700; font-size: 1rem; color: white; }
.exam-header-sub { font-size: 0.78rem; color: rgba(255,255,255,0.7); }
.user-info-bar { display: flex; align-items: center; gap: 14px; }
.timer-exam {
  font-family: var(--font-alt);
  font-size: 1.6rem;
  font-weight: 800;
  color: white;
  background: rgba(255,255,255,0.1);
  border: 2px solid rgba(255,255,255,0.3);
  border-radius: 8px;
  padding: 6px 18px;
  letter-spacing: 3px;
  min-width: 120px;
  text-align: center;
}
.timer-exam.warning { color: #FFD700; border-color: rgba(255,215,0,0.5); background: rgba(255,215,0,0.08); }
.timer-exam.danger { color: #ff6b6b; border-color: rgba(255,107,107,0.5); animation: blink 0.6s infinite; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.6} }

.exam-body { max-width: 900px; margin: 0 auto; padding: 24px 16px; }

.exam-para-box {
  background: #fff;
  color: #222;
  border-radius: 8px;
  padding: 20px 22px;
  font-size: 1rem;
  line-height: 2;
  font-family: 'Courier New', monospace;
  min-height: 130px;
  margin-bottom: 18px;
  border: 2px solid #ddd;
  user-select: none;
}
.exam-para-box .char-correct { color: #2e7d32; }
.exam-para-box .char-wrong { color: #c62828; background: #ffebee; border-radius: 2px; }
.exam-para-box .char-current { border-bottom: 2px solid #1a237e; animation: blink 1s infinite; }
.exam-para-box .char-pending { color: #555; }

.exam-input {
  background: #fff;
  border: 2px solid #3949ab;
  border-radius: 8px;
  color: #111;
  font-family: 'Courier New', monospace;
  font-size: 1rem;
  padding: 14px 16px;
  width: 100%;
  resize: none;
  line-height: 1.8;
  outline: none;
}
.exam-input:focus { border-color: #1a237e; box-shadow: 0 0 0 3px rgba(26,35,126,0.15); }

.stats-row {
  display: flex;
  gap: 12px;
  margin-bottom: 18px;
}
.stat-pill {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 10px 16px;
  text-align: center;
  flex: 1;
}
.stat-pill .val { font-size: 1.4rem; font-weight: 700; font-family: var(--font-alt); color: var(--primary); }
.stat-pill .lbl { font-size: 0.7rem; color: var(--text-dim); letter-spacing: 1px; text-transform: uppercase; }

.exam-result-box {
  background: white;
  color: #111;
  border-radius: 12px;
  padding: 28px;
  text-align: center;
  max-width: 500px;
  margin: 0 auto;
}
.exam-result-box h3 { color: #1a237e; font-weight: 800; margin-bottom: 20px; }
.result-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 20px; }
.result-cell { background: #f5f5f5; border-radius: 8px; padding: 12px; text-align: center; }
.result-cell .big { font-size: 1.6rem; font-weight: 800; color: #1a237e; font-family: var(--font-alt); }
.result-cell .sm { font-size: 0.72rem; color: #666; text-transform: uppercase; letter-spacing: 1px; }
.pass-badge { background: #e8f5e9; color: #2e7d32; border: 1px solid #a5d6a7; border-radius: 8px; padding: 10px 20px; font-weight: 700; display: inline-block; margin-bottom: 16px; font-size: 0.9rem; }
.fail-badge { background: #ffebee; color: #c62828; border: 1px solid #ffcdd2; border-radius: 8px; padding: 10px 20px; font-weight: 700; display: inline-block; margin-bottom: 16px; font-size: 0.9rem; }
</style>
</head>
<body>

<!-- EXAM HEADER — real exam portal style -->
<div class="exam-header">
  <div>
    <div class="exam-header-title" id="exam-name">SSC CGL Typing Test</div>
    <div class="exam-header-sub">
      <span id="exam-lang">English Typing</span> &nbsp;|&nbsp;
      <span id="exam-req">Required: 35 WPM · 95% Accuracy</span>
    </div>
  </div>
  <div class="user-info-bar">
    <div style="text-align:right">
      <div style="font-size:0.82rem;color:rgba(255,255,255,0.7)">Candidate</div>
      <div style="font-weight:700;color:white" id="candidate-name">Guest</div>
    </div>
    <div>
      <div style="font-size:0.72rem;color:rgba(255,255,255,0.6);margin-bottom:2px;text-align:center">Time Left</div>
      <div class="timer-exam" id="exam-timer">10:00</div>
    </div>
  </div>
</div>

<!-- BODY -->
<div class="exam-body" id="exam-body">
  <!-- Stats -->
  <div class="stats-row">
    <div class="stat-pill"><div class="val" id="s-wpm">0</div><div class="lbl">WPM</div></div>
    <div class="stat-pill"><div class="val" id="s-acc">100%</div><div class="lbl">Accuracy</div></div>
    <div class="stat-pill"><div class="val" id="s-correct" style="color:var(--success)">0</div><div class="lbl">Correct</div></div>
    <div class="stat-pill"><div class="val" id="s-wrong" style="color:var(--danger)">0</div><div class="lbl">Errors</div></div>
  </div>

  <!-- Paragraph Display -->
  <div class="exam-para-box" id="exam-para"></div>

  <!-- Input -->
  <textarea class="exam-input" id="exam-input" rows="4"
    placeholder="Click 'Start Test' then type here..." disabled
    spellcheck="false" autocorrect="off" autocomplete="off"></textarea>

  <!-- Controls -->
  <div class="d-flex justify-content-between align-items-center mt-3">
    <div style="display:flex;gap:8px">
      <button onclick="changeFontSize(1)" style="background:var(--bg-card2);color:var(--text-muted);border:1px solid var(--border);border-radius:6px;padding:6px 12px;cursor:pointer;font-family:var(--font)">A+</button>
      <button onclick="changeFontSize(-1)" style="background:var(--bg-card2);color:var(--text-muted);border:1px solid var(--border);border-radius:6px;padding:6px 12px;cursor:pointer;font-family:var(--font)">A-</button>
    </div>
    <button class="btn btn-green px-4 py-2 fw-600" id="start-btn" onclick="startExam()">
      <i class="bi bi-play-fill me-1"></i>Start Test
    </button>
  </div>

  <!-- Progress bar -->
  <div style="margin-top:16px">
    <div style="display:flex;justify-content:space-between;margin-bottom:4px">
      <small style="color:var(--text-muted)">Progress</small>
      <small style="color:var(--primary)" id="prog-pct">0%</small>
    </div>
    <div class="progress-dark"><div class="progress-bar" id="prog-bar" style="width:0%"></div></div>
  </div>
</div>

<!-- RESULT SCREEN (hidden initially) -->
<div id="result-screen" style="display:none;padding:32px 16px">
  <div class="exam-result-box">
    <h3 id="result-title">Test Complete!</h3>
    <div id="result-badge"></div>
    <div class="result-grid" id="result-grid"></div>
    <div style="font-size:0.82rem;color:#666;margin-bottom:20px" id="result-note"></div>
    <div style="display:flex;gap:10px;justify-content:center;flex-wrap:wrap">
      <button onclick="location.reload()" style="background:#1a237e;color:white;border:none;border-radius:8px;padding:10px 24px;font-weight:600;cursor:pointer;font-family:var(--font)">Try Again</button>
      <button onclick="window.location.href='exams.html'" style="background:#f5f5f5;color:#333;border:1px solid #ddd;border-radius:8px;padding:10px 24px;font-weight:600;cursor:pointer;font-family:var(--font)">Back to Exams</button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="js/firebase-config.js"></script>
<script src="js/firebase-service.js"></script>
<script src="js/main.js"></script>
<script>
const params = new URLSearchParams(window.location.search);
const examName = params.get('exam') || 'SSC CGL Typing Test';
const examLang = params.get('lang') || 'English';
const examDuration = parseInt(params.get('duration') || '10');
const examReqWpm = parseInt(params.get('wpm') || '35');
const testNum = params.get('test') || '1';
const user = Auth.getUser() || { name: 'Candidate' };

// Set header info
document.getElementById('exam-name').textContent = examName + ' — Test ' + testNum;
document.getElementById('exam-lang').textContent = examLang + ' Typing';
document.getElementById('exam-req').textContent = 'Required: ' + examReqWpm + ' WPM · 95% Accuracy';
document.getElementById('candidate-name').textContent = user.name;
document.title = examName + ' — GOTypingTest.com';

const para = "Technology has transformed the way we communicate and work in the modern world. People now rely on computers, smartphones, and the internet to stay connected."; // NOTE: this page (exam-testolde.html) is legacy/unused — not linked from anywhere in the site. Kept as-is, not wired to Firestore.
let engine = null;
let timerInterval = null;
let timeLeft = examDuration * 60;
let started = false;
let fontSize = 1;

// Show paragraph
document.getElementById('exam-para').innerHTML = para.split('').map((c,i) =>
  `<span class="${i===0?'char-current':'char-pending'}">${c}</span>`).join('');

function updateTimer() {
  const el = document.getElementById('exam-timer');
  const m = Math.floor(timeLeft/60);
  const s = timeLeft % 60;
  el.textContent = String(m).padStart(2,'0') + ':' + String(s).padStart(2,'0');
  if (timeLeft <= 60) el.className = 'timer-exam warning';
  if (timeLeft <= 10) el.className = 'timer-exam danger';
  if (timeLeft <= 0) {
    clearInterval(timerInterval);
    endTest();
  }
  timeLeft--;
}

function startExam() {
  document.getElementById('start-btn').style.display = 'none';
  const inp = document.getElementById('exam-input');
  inp.disabled = false;
  inp.focus();
  started = true;

  engine = new TypingEngine(para,
    (stats) => {
      document.getElementById('s-wpm').textContent = stats.wpm;
      document.getElementById('s-acc').textContent = stats.accuracy + '%';
      document.getElementById('s-correct').textContent = stats.correct;
      document.getElementById('s-wrong').textContent = stats.errors;
      document.getElementById('prog-bar').style.width = stats.progress.toFixed(1) + '%';
      document.getElementById('prog-pct').textContent = stats.progress.toFixed(0) + '%';
      document.getElementById('exam-para').innerHTML = engine.getRenderedHTML();
    },
    (stats) => { clearInterval(timerInterval); showResult(stats); }
  );

  timerInterval = setInterval(updateTimer, 1000);
}

document.getElementById('exam-input').addEventListener('input', (e) => {
  if (engine && started) engine.processInput(e.target.value);
});

function endTest() {
  if (!engine) {
    showResult({ wpm: 0, accuracy: 0, correct: 0, wrong: 0, errors: 0, time: examDuration * 60 });
    return;
  }
  document.getElementById('exam-input').disabled = true;
  const wpm = parseInt(document.getElementById('s-wpm').textContent) || 0;
  const acc = parseInt(document.getElementById('s-acc').textContent) || 0;
  const correct = parseInt(document.getElementById('s-correct').textContent) || 0;
  const wrong = parseInt(document.getElementById('s-wrong').textContent) || 0;
  showResult({ wpm, accuracy: acc, correct, wrong, errors: wrong, time: examDuration * 60 });
}

function showResult(stats) {
  document.getElementById('exam-input').disabled = true;
  document.getElementById('exam-body').style.display = 'none';
  document.getElementById('result-screen').style.display = 'block';

  const passed = stats.wpm >= examReqWpm && stats.accuracy >= 95;
  document.getElementById('result-title').textContent = examName + ' — Result';
  document.getElementById('result-badge').innerHTML = passed
    ? `<div class="pass-badge">✅ PASSED — You met the required speed!</div>`
    : `<div class="fail-badge">❌ FAILED — ${stats.wpm < examReqWpm ? 'Speed below ' + examReqWpm + ' WPM requirement' : 'Accuracy below 95%'}</div>`;

  document.getElementById('result-grid').innerHTML = `
    <div class="result-cell"><div class="big">${stats.wpm}</div><div class="sm">Gross WPM</div></div>
    <div class="result-cell"><div class="big">${stats.accuracy}%</div><div class="sm">Accuracy</div></div>
    <div class="result-cell"><div class="big" style="color:#2e7d32">${stats.correct}</div><div class="sm">Correct Chars</div></div>
    <div class="result-cell"><div class="big" style="color:#c62828">${stats.wrong || stats.errors}</div><div class="sm">Wrong Chars</div></div>`;

  document.getElementById('result-note').innerHTML =
    `Required: <strong>${examReqWpm} WPM</strong> · <strong>95% Accuracy</strong> · Duration: <strong>${examDuration} Minutes</strong>`;

  // Save result
  const results = JSON.parse(localStorage.getItem('te_results') || '[]');
  results.unshift({ contestId: 0, contestName: examName, ...stats, date: new Date().toISOString() });
  localStorage.setItem('te_results', JSON.stringify(results.slice(0, 20)));
}

function changeFontSize(d) {
  fontSize = Math.max(0.85, Math.min(1.3, fontSize + d * 0.1));
  document.getElementById('exam-para').style.fontSize = fontSize + 'rem';
  document.getElementById('exam-input').style.fontSize = fontSize + 'rem';
}
</script>
</body>
</html>
