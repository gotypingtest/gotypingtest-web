<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Login — GOTypingTest.com</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
<link rel="stylesheet" href="css/style.css">
<style>
.auth-page { min-height: 100vh; background: linear-gradient(135deg, #06080f 0%, #0a0e1a 50%, #071a10 100%); display: flex; align-items: center; justify-content: center; padding: 40px 16px; }
.auth-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 40px 36px; width: 100%; max-width: 420px; }
.form-label { color: var(--text-muted); font-size: 0.85rem; font-weight: 500; margin-bottom: 6px; }
.input-group-icon { position: relative; }
.input-group-icon i { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--text-dim); font-size: 1rem; }
.input-group-icon input { padding-left: 38px !important; }
</style>
</head>
<body>
<div class="auth-page">
  <div style="width:100%;max-width:420px">
    <div class="text-center mb-4">
      <a href="index.html" style="text-decoration:none;font-size:1.6rem;font-weight:800;"><span style="color:var(--text-white)">Tyep&</span><span style="color:var(--primary)">Earn</span></a>
    </div>
    <div class="auth-card">
      <div class="text-center mb-4">
        <h3 class="fw-700 mb-1" style="font-size:1.5rem">Welcome</h3>
        <p style="color:var(--text-muted);font-size:0.88rem">Google se sign in karo (recommended — verified & secure), ya naam+mobile se seedha continue karo.</p>
      </div>

      <button type="button" id="google-btn" class="btn w-100 py-3 fw-600 mb-3 d-flex align-items-center justify-content-center gap-2" style="background:#fff;color:#1f1f1f;border:1px solid var(--border);font-size:0.95rem" onclick="handleGoogleLogin()">
        <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#FFC107" d="M43.6 20.5H42V20H24v8h11.3C33.7 32.7 29.3 36 24 36c-6.6 0-12-5.4-12-12s5.4-12 12-12c3.1 0 5.8 1.1 8 3l6-6C34.9 5.1 29.7 3 24 3 12.4 3 3 12.4 3 24s9.4 21 21 21 21-9.4 21-21c0-1.4-.1-2.7-.4-3.5z"/><path fill="#FF3D00" d="M6.3 14.7l6.6 4.8C14.5 15.4 18.9 12 24 12c3.1 0 5.8 1.1 8 3l6-6C34.9 5.1 29.7 3 24 3c-7.7 0-14.4 4.4-17.7 10.7z"/><path fill="#4CAF50" d="M24 45c5.6 0 10.7-1.9 14.7-5.2l-6.8-5.7c-2.1 1.4-4.8 2.3-7.9 2.3-5.2 0-9.6-3.3-11.3-8l-6.6 5.1C9.5 40.5 16.2 45 24 45z"/><path fill="#1976D2" d="M43.6 20.5H42V20H24v8h11.3c-.8 2.3-2.3 4.2-4.2 5.6l6.8 5.7C41.9 36 45 30.6 45 24c0-1.4-.1-2.7-.4-3.5z"/></svg>
        Continue with Google
      </button>

      <div class="d-flex align-items-center gap-2 mb-3">
        <div style="flex:1;height:1px;background:var(--border)"></div>
        <span style="color:var(--text-dim);font-size:0.78rem">OR</span>
        <div style="flex:1;height:1px;background:var(--border)"></div>
      </div>

      <form id="loginForm" onsubmit="handleLogin(event)">
        <div class="mb-3">
          <label class="form-label">Full Name</label>
          <div class="input-group-icon">
            <i class="bi bi-person"></i>
            <input type="text" id="login-name" class="input-dark" placeholder="Himanshu Sharma" required>
          </div>
        </div>
        <div class="mb-4">
          <label class="form-label">Mobile Number</label>
          <div class="input-group-icon">
            <i class="bi bi-phone"></i>
            <input type="tel" id="login-mobile" class="input-dark" placeholder="98765 43210" maxlength="10" required>
          </div>
        </div>
        <button type="submit" id="login-btn" class="btn btn-green w-100 py-3 fw-600 mb-3" style="font-size:1rem">Continue</button>
      </form>

      <div class="text-center" style="color:var(--text-muted);font-size:0.88rem">
        Pehli baar aaye ho? Yahi form bhar do — account khud ban jayega.
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="js/firebase-config.js"></script>
<script src="js/firebase-service.js"></script>
<script src="js/main.js"></script>
<script>
async function handleGoogleLogin() {
  const btn = document.getElementById('google-btn');
  btn.disabled = true;
  try {
    const user = await Auth.loginWithGoogle();
    showToast('Welcome, ' + user.name.split(' ')[0] + '!');
    setTimeout(() => window.location.href = 'dashboard.html', 600);
  } catch (err) {
    console.error(err);
    if (err.code !== 'auth/popup-closed-by-user') {
      showToast('Google sign-in fail ho gaya, dobara try karo', 'danger');
    }
    btn.disabled = false;
  }
}

async function handleLogin(e) {
  e.preventDefault();
  const name = document.getElementById('login-name').value.trim();
  const mobile = document.getElementById('login-mobile').value.trim();
  if (!/^[0-9]{10}$/.test(mobile)) { showToast('Sahi 10-digit mobile number daalo', 'danger'); return; }
  const btn = document.getElementById('login-btn');
  btn.disabled = true; btn.textContent = 'Please wait...';
  try {
    const user = await Auth.loginOrRegister(name, mobile);
    showToast('Welcome, ' + user.name.split(' ')[0] + '!');
    setTimeout(() => window.location.href = 'dashboard.html', 600);
  } catch (err) {
    console.error(err);
    showToast('Kuch gadbad ho gayi, dobara try karo', 'danger');
    btn.disabled = false; btn.textContent = 'Continue';
  }
}
</script>
</body>
</html>
